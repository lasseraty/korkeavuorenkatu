<!doctype html><html lang="fi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin – huonekalujen jako</title><link rel="stylesheet" href="styles.css"></head><body><main class="container"><header class="hero"><h1>Huonekalujen jako – admin</h1><div id="stats" class="stats"></div><div class="toolbar no-print"><button id="addBtn" class="primary">+ Lisää huonekalu</button><button id="printBtn">Tulosta</button><button id="refreshBtn">Päivitä</button><button id="clearBtn" class="danger">Tyhjennä vastaukset</button></div><div class="filters no-print"><button data-filter="all" class="active">Kaikki</button><button data-filter="conflict">Keskusteltavat</button><button data-filter="clear">Selvät</button><button data-filter="none">Ei kiinnostuneita</button><button data-filter="decided">Päätetyt</button><button data-filter="open">Ratkaisematta</button></div><div id="adminStatus" class="saved"></div></header><section id="adminItems"></section></main><dialog id="editDialog"><form method="dialog" id="editForm"><h2 id="editTitle">Lisää huonekalu</h2><input type="hidden" id="editId"><label>Nimi<input id="editName" required maxlength="120"></label><label>Kuvaus<textarea id="editDescription" maxlength="500"></textarea></label><label>Kuva<input id="editImage" type="file" accept="image/*"></label><label>Järjestysnumero<input id="editOrder" type="number" min="1" required></label><div class="toolbar"><button value="cancel">Peruuta</button><button type="button" id="saveItemBtn" class="primary">Tallenna</button></div></form></dialog><script type="module" src="admin.js"></script></body></html>
